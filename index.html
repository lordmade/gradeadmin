<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>MTech Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 40px; }
    .card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    .btn { background: #0066ff; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .item-row { display: flex; justify-content: space-between; background: #f8fafc; padding: 10px; margin-bottom: 5px; border-radius: 8px; }
  </style>
</head>
<body>

  <h1>MTech CMS Dashboard</h1>

  <div class="card">
    <h2>Hero Settings</h2>
    <div class="grid">
      <input type="text" id="h-badge" placeholder="Badge">
      <input type="text" id="h-bg" placeholder="Cloudinary BG ID">
    </div>
    <input type="text" id="h-m" placeholder="Main Title">
    <input type="text" id="h-g" placeholder="Gradient Title">
    <textarea id="h-d" placeholder="Description"></textarea>
    <button class="btn" onclick="saveHero()">Update Hero</button>
  </div>

  <div class="card">
    <h2>Manage Testimonials</h2>
    <div id="t-list"></div>
    <hr>
    <h3>Add Testimonial</h3>
    <input type="text" id="t-name" placeholder="Client Name">
    <input type="text" id="t-comp" placeholder="Company">
    <input type="text" id="t-img" placeholder="Cloudinary Photo ID">
    <textarea id="t-text" placeholder="The Review Text..."></textarea>
    <button class="btn" onclick="addTestimonial()">Add Testimonial</button>
  </div>

  <script>
    const firebaseConfig = { /* ... SAME AS ABOVE ... */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Save Hero
    function saveHero() {
      db.ref('homepage/hero').set({
        badge: document.getElementById('h-badge').value,
        bgImageId: document.getElementById('h-bg').value,
        titleMain: document.getElementById('h-m').value,
        titleGradient: document.getElementById('h-g').value,
        description: document.getElementById('h-d').value
      });
    }

    // Manage Testimonials
    let tData = [];
    db.ref('homepage/testimonials').on('value', snap => {
      tData = snap.val() || [];
      document.getElementById('t-list').innerHTML = tData.map((t, idx) => `
        <div class="item-row">
          <span><strong>${t.name}</strong> (${t.company})</span>
          <button onclick="deleteT(${idx})" style="color:red; border:none; cursor:pointer;">&times;</button>
        </div>
      `).join('');
    });

    function addTestimonial() {
      const n = {
        name: document.getElementById('t-name').value,
        company: document.getElementById('t-comp').value,
        imgId: document.getElementById('t-img').value,
        text: document.getElementById('t-text').value
      };
      tData.push(n);
      db.ref('homepage/testimonials').set(tData);
    }

    function deleteT(idx) {
      tData.splice(idx, 1);
      db.ref('homepage/testimonials').set(tData);
    }
  </script>
</body>
</html>
