<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTech Admin | Control Center</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root { --primary: #0066ff; --sidebar-bg: #0f172a; --main-bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--main-bg); display: flex; height: 100vh; overflow: hidden; }

    aside { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 30px 20px; }
    .logo { font-family: 'Manrope'; font-weight: 800; font-size: 1.5rem; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
    .nav-btn { background: transparent; border: none; color: #94a3b8; padding: 12px 15px; text-align: left; font-size: 0.95rem; font-weight: 500; cursor: pointer; border-radius: 10px; transition: 0.3s; margin-bottom: 5px; width: 100%; }
    .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.1); color: white; }

    main { flex: 1; overflow-y: auto; padding: 40px; }
    .section-view { display: none; }
    .section-view.active { display: block; }

    .card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); padding: 30px; margin-bottom: 25px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 8px; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; }
    
    .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-upload { background: #10b981; margin-top: 10px; font-size: 0.8rem; padding: 8px 15px; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }

    .img-preview { width: 100px; height: 60px; object-fit: cover; border-radius: 8px; margin-top: 10px; background: #eee; display: block; }
  </style>
</head>
<body>

  <aside>
    <div class="logo"><i class="fas fa-bolt"></i> MTech Admin</div>
    <button class="nav-btn active" onclick="showView('hero-view', this)"><i class="fas fa-home"></i> Hero Section</button>
    <button class="nav-btn" onclick="showView('services-view', this)"><i class="fas fa-briefcase"></i> Services</button>
    <button class="nav-btn" onclick="showView('theme-view', this)"><i class="fas fa-palette"></i> Theme & Config</button>
  </aside>

  <main>
    <div id="hero-view" class="section-view active">
      <h2>Hero Management</h2>
      <div class="card">
        <div class="form-group">
          <label>Background Image</label>
          <input type="file" id="hero-file-input" accept="image/*">
          <button class="btn btn-upload" onclick="uploadFile('hero-file-input', 'hero-bg-id')">Upload to Cloudinary</button>
          <input type="text" id="hero-bg-id" placeholder="Image Public ID" readonly style="margin-top:10px; background:#f1f5f9;">
        </div>
        <div class="form-group"><label>Badge</label><input type="text" id="hero-badge"></div>
        <div class="form-group"><label>Main Title</label><input type="text" id="hero-titleMain"></div>
        <button class="btn" onclick="saveHero()">Save Hero Changes</button>
      </div>
    </div>

    <div id="services-view" class="section-view">
      <h2>Add New Service</h2>
      <div class="card">
        <div class="form-group">
          <label>Service Icon/Image</label>
          <input type="file" id="srv-file-input" accept="image/*">
          <button class="btn btn-upload" onclick="uploadFile('srv-file-input', 'srv-img-id')">Upload Icon</button>
          <input type="text" id="srv-img-id" placeholder="Icon ID" readonly style="margin-top:10px; background:#f1f5f9;">
        </div>
        <div class="form-group"><label>Service Title</label><input type="text" id="srv-title"></div>
        <textarea id="srv-desc" rows="3" placeholder="Description..."></textarea>
        <button class="btn" style="margin-top:15px;" onclick="addService()">Add Service</button>
      </div>
    </div>

    <div id="theme-view" class="section-view">
      <h2>Cloudinary & Theme Setup</h2>
      <div class="card">
        <h3>Cloudinary Configuration</h3>
        <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 15px;">Setup an "Unsigned Upload Preset" in your Cloudinary Settings > Upload tab.</p>
        <div class="form-group">
          <label>Cloudinary Name</label>
          <input type="text" id="cloud-name" value="dqkujefxj">
        </div>
        <div class="form-group">
          <label>Upload Preset (Unsigned)</label>
          <input type="text" id="upload-preset" placeholder="Enter your preset name">
        </div>
        <button class="btn" onclick="saveConfig()">Save Config</button>
      </div>

      <div class="card">
        <h3>Colors</h3>
        <label>Primary Color</label>
        <input type="color" id="theme-primary" style="height: 50px;">
        <button class="btn" style="margin-top: 15px;" onclick="saveTheme()">Update Colors</button>
      </div>
    </div>
  </main>

  <script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
      authDomain: "pinotp-d7ef5.firebaseapp.com",
      databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
      projectId: "pinotp-d7ef5",
      storageBucket: "pinotp-d7ef5.firebasestorage.app",
      messagingSenderId: "708458917827",
      appId: "1:708458917827:web:375de278577df0adcf9776"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- NAVIGATION ---
    function showView(viewId, btn) {
      document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      btn.classList.add('active');
    }

    // --- CLOUDINARY UPLOAD LOGIC ---
    async function uploadFile(inputId, targetId) {
      const file = document.getElementById(inputId).files[0];
      const cloudName = document.getElementById('cloud-name').value;
      const preset = document.getElementById('upload-preset').value;

      if (!file || !preset) return alert("Please select a file and ensure the Upload Preset is set in Theme & Config.");

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', preset);

      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        
        if (data.public_id) {
          document.getElementById(targetId).value = data.public_id;
          alert("Upload Successful!");
        } else {
          alert("Upload failed: " + data.error.message);
        }
      } catch (err) {
        console.error(err);
        alert("Upload error. Check console.");
      }
    }

    // --- DATABASE ACTIONS ---
    function saveHero() {
      db.ref('homepage/hero').update({
        badge: document.getElementById('hero-badge').value,
        titleMain: document.getElementById('hero-titleMain').value,
        bgImageId: document.getElementById('hero-bg-id').value
      }).then(() => alert("Hero Updated!"));
    }

    async function addService() {
      const snap = await db.ref('homepage/services').get();
      const list = snap.val() || [];
      list.push({
        title: document.getElementById('srv-title').value,
        desc: document.getElementById('srv-desc').value,
        logoId: document.getElementById('srv-img-id').value
      });
      db.ref('homepage/services').set(list).then(() => alert("Service Added!"));
    }

    function saveConfig() {
        db.ref('settings/config').set({
            preset: document.getElementById('upload-preset').value,
            cloudName: document.getElementById('cloud-name').value
        }).then(() => alert("Config Saved!"));
    }

    // Initial Load for Config
    db.ref('settings/config').on('value', snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('upload-preset').value = d.preset || '';
            document.getElementById('cloud-name').value = d.cloudName || 'dqkujefxj';
        }
    });
  </script>
</body>
</html>
