<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTech Solutions | Admin Dashboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --primary: #0066ff;
      --primary-hover: #0052cc;
      --bg: #f8fafc;
      --surface: #ffffff;
      --sidebar-bg: #1e293b;
      --sidebar-text: #f1f5f9;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow-md: 0 10px 30px rgba(0,0,0,0.05);
      --shadow-lg: 0 20px 40px rgba(0,102,255,0.1);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex; /* Sidebar layout */
      min-height: 100vh;
    }

    /* --- Sidebar Styles --- */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: var(--transition);
    }

    .sidebar-header {
      padding: 2rem;
      font-size: 1.25rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header i { color: var(--primary); }

    .sidebar-nav {
      flex: 1;
      padding: 1.5rem 1rem;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.8rem 1rem;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 500;
      border-radius: 10px;
      margin-bottom: 0.5rem;
      transition: var(--transition);
    }

    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .sidebar-nav a.active {
      background: var(--primary);
      box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
    }

    .sidebar-footer {
      padding: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.8rem;
      color: #64748b;
    }

    /* --- Content Area --- */
    .main-content {
      flex: 1;
      margin-left: 260px; /* Space for sidebar */
      padding: 2rem;
      max-width: 1200px;
      transition: var(--transition);
    }

    /* Mobile Header/Toggle */
    .mobile-top-bar {
      display: none;
      background: white;
      padding: 1rem;
      position: sticky;
      top: 0;
      z-index: 999;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .menu-toggle {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-main);
    }

    /* --- Components (Cards, Inputs, Buttons) --- */
    .section-header { margin-bottom: 2rem; }
    .section-header h2 { font-size: 1.8rem; font-weight: 700; }
    .section-header p { color: var(--text-muted); }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: var(--shadow-md);
      margin-bottom: 3rem;
      border: 1px solid var(--border);
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s ease forwards;
    }

    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .card-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .card-title i { color: var(--primary); }

    .form-group { margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
    
    input[type="text"], input[type="number"], textarea {
      width: 100%; padding: 0.85rem 1rem;
      border: 2px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 1rem; transition: var(--transition);
      background: #f8fafc;
    }

    input:focus, textarea:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1); }

    /* Grid for items */
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
    .item-box { border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; background: #fafafa; }

    /* Custom File Upload */
    .file-upload-wrapper { position: relative; margin-bottom: 1rem; }
    .file-upload-input { width: 0.1px; height: 0.1px; opacity: 0; overflow: hidden; position: absolute; z-index: -1; }
    .file-upload-label {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 0.8rem; background: white; border: 2px dashed var(--border);
      border-radius: 10px; cursor: pointer; font-weight: 500; color: var(--text-muted); transition: var(--transition);
    }
    .file-upload-label:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }

    .image-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-top: 1rem; display: none; border: 1px solid var(--border); }

    /* Sticky Save Bar */
    .action-bar {
      position: fixed; bottom: 0; left: 260px; right: 0;
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
      padding: 1.2rem 2rem; border-top: 1px solid var(--border);
      display: flex; justify-content: center; z-index: 900;
      transition: var(--transition);
    }

    .btn {
      background: var(--primary); color: white; border: none; padding: 1rem 3.5rem;
      border-radius: 999px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
      transition: var(--transition); box-shadow: var(--shadow-lg);
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }

    /* Toast */
    #toast {
      visibility: hidden; min-width: 300px; background: #10b981; color: #fff;
      text-align: center; border-radius: 12px; padding: 1rem; position: fixed;
      z-index: 2000; left: 50%; top: 30px; transform: translateX(-50%) translateY(-20px);
      opacity: 0; font-weight: 600; transition: all 0.4s;
    }
    #toast.show { visibility: visible; transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Responsiveness */
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .action-bar { left: 0; }
      .mobile-top-bar { display: flex; }
    }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <i class="fas fa-rocket"></i> MTech Admin
  </div>
  <nav class="sidebar-nav">
    <a href="#hero-section" class="active"><i class="fas fa-home"></i> Hero Content</a>
    <a href="#hardware-section"><i class="fas fa-laptop"></i> Hardware Shop</a>
    <a href="#stats-section"><i class="fas fa-chart-bar"></i> Results / Stats</a>
    <a href="#" onclick="window.location.reload()"><i class="fas fa-sync"></i> Refresh Data</a>
  </nav>
  <div class="sidebar-footer">
    &copy; 2026 MTech Solutions<br>Logged in as Admin
  </div>
</aside>

<div class="mobile-top-bar">
  <div style="font-weight: 800;"><i class="fas fa-rocket" style="color:var(--primary)"></i> MTech Admin</div>
  <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
</div>

<main class="main-content">
  
  <header class="section-header">
    <h2>Dashboard Overview</h2>
    <p>Manage your website content in real-time.</p>
  </header>

  <section id="hero-section" class="card">
    <div class="card-title"><i class="fas fa-edit"></i> Hero Section</div>
    <div class="form-group">
      <label>Badge Text</label>
      <input type="text" id="heroBadge" placeholder="e.g. Innovation in Mokopane">
    </div>
    <div class="form-group">
      <label>Main Title</label>
      <input type="text" id="heroTitle">
    </div>
    <div class="form-group">
      <label>Subtitle / Description</label>
      <textarea id="heroDesc"></textarea>
    </div>
  </section>

  <section id="hardware-section" class="card">
    <div class="card-title"><i class="fas fa-shopping-cart"></i> Hardware Shop</div>
    <div class="grid-2" id="shopContainer">
      </div>
  </section>

  <section id="stats-section" class="card">
    <div class="card-title"><i class="fas fa-tachometer-alt"></i> Statistics</div>
    <div class="grid-2" id="statsContainer">
      </div>
  </section>

</main>

<div class="action-bar">
  <button class="btn" id="saveBtn" onclick="saveData()">Publish All Changes</button>
</div>

<div id="toast"><i class="fas fa-check-circle"></i> Changes Published Successfully!</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // Configuration
  const firebaseConfig = {
      apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
      authDomain: "pinotp-d7ef5.firebaseapp.com",
      databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
      projectId: "pinotp-d7ef5",
      storageBucket: "pinotp-d7ef5.firebasestorage.app",
      messagingSenderId: "708458917827",
      appId: "1:708458917827:web:375de278577df0adcf9776"
  };
  const CLOUD_NAME = "dv5bsbydu";
  const UPLOAD_PRESET = "admin_tlaka";

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Toggle Sidebar for Mobile
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
  }

  // Sidebar Link Highlight
  const navLinks = document.querySelectorAll('.sidebar-nav a');
  navLinks.forEach(link => {
    link.addEventListener('click', () => {
      navLinks.forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      if(window.innerWidth <= 1024) toggleSidebar();
    });
  });

  // Build UI
  const shopContainer = document.getElementById('shopContainer');
  for (let i = 0; i < 4; i++) {
    shopContainer.innerHTML += `
      <div class="item-box">
        <label>Product ${i + 1} Image</label>
        <div class="file-upload-wrapper">
          <input type="file" id="file${i}" class="file-upload-input" onchange="uploadImage(event, ${i})">
          <label for="file${i}" class="file-upload-label"><i class="fas fa-upload"></i> Upload</label>
        </div>
        <img id="shopImgPreview${i}" class="image-preview">
        <input type="hidden" id="shopImgUrl${i}">
        <div class="form-group"><input type="text" id="shopTitle${i}" placeholder="Title"></div>
        <div class="form-group"><input type="text" id="shopDesc${i}" placeholder="Desc"></div>
      </div>
    `;
  }

  const statsContainer = document.getElementById('statsContainer');
  for (let i = 0; i < 3; i++) {
    statsContainer.innerHTML += `
      <div class="item-box">
        <div class="form-group"><label>Value</label><input type="number" id="statNum${i}"></div>
        <div class="form-group"><label>Label</label><input type="text" id="statLabel${i}"></div>
      </div>
    `;
  }

  // Same Fetch/Upload/Save Logic from previous version...
  db.ref('websiteContent').once('value').then((snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    document.getElementById('heroBadge').value = data.hero?.badge || '';
    document.getElementById('heroTitle').value = data.hero?.title || '';
    document.getElementById('heroDesc').value = data.hero?.desc || '';
    data.shop?.forEach((item, i) => {
      document.getElementById(`shopTitle${i}`).value = item.title || '';
      document.getElementById(`shopDesc${i}`).value = item.desc || '';
      document.getElementById(`shopImgUrl${i}`).value = item.image || '';
      if(item.image) {
        const p = document.getElementById(`shopImgPreview${i}`);
        p.src = item.image; p.style.display = 'block';
      }
    });
    data.stats?.forEach((item, i) => {
      document.getElementById(`statNum${i}`).value = item.num || '';
      document.getElementById(`statLabel${i}`).value = item.label || '';
    });
  });

  async function uploadImage(event, index) {
    const file = event.target.files[0];
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    try {
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
      const data = await res.json();
      document.getElementById(`shopImgUrl${index}`).value = data.secure_url;
      const p = document.getElementById(`shopImgPreview${index}`);
      p.src = data.secure_url; p.style.display = 'block';
    } catch (e) { console.error(e); }
  }

  function saveData() {
    const shop = []; for(let i=0; i<4; i++) shop.push({title: document.getElementById(`shopTitle${i}`).value, desc: document.getElementById(`shopDesc${i}`).value, image: document.getElementById(`shopImgUrl${i}`).value});
    const stats = []; for(let i=0; i<3; i++) stats.push({num: document.getElementById(`statNum${i}`).value, label: document.getElementById(`statLabel${i}`).value});
    const payload = {
      hero: { badge: document.getElementById('heroBadge').value, title: document.getElementById('heroTitle').value, desc: document.getElementById('heroDesc').value },
      shop, stats
    };
    db.ref('websiteContent').set(payload).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    });
  }
</script>
</body>
</html>
