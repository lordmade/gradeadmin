<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTech Solutions — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root {
      --primary: #0066ff;
      --primary-dark: #0055dd;
      --primary-light: #4d94ff;
      --dark: #0f172a;
      --gray: #64748b;
      --light: #ffffff;
      --light-2: #f8fafc;
      --border: #e2e8f0;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--light-2);
      color: var(--dark);
      line-height: 1.6;
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--dark);
      color: white;
      padding: 1.5rem 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 0 1.8rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header h2 {
      font-family: 'Manrope';
      font-size: 1.6rem;
      background: linear-gradient(135deg, #60a5fa, #0066ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-nav {
      margin-top: 2rem;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.95rem 1.8rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: all 0.25s;
      border-left: 3px solid transparent;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: rgba(0,102,255,0.15);
      color: white;
      border-left-color: var(--primary);
    }

    .sidebar-nav i {
      width: 20px;
      text-align: center;
    }

    /* Main Content */
    .main-content {
      padding: 2.5rem 3rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-family: 'Manrope';
      font-size: 2.1rem;
      font-weight: 800;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      padding: 1.8rem 2.2rem;
      margin-bottom: 2.2rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.4rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-family: 'Manrope';
      font-size: 1.35rem;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      margin-bottom: 0.55rem;
      font-weight: 600;
      color: var(--gray);
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,102,255,0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .btn {
      padding: 0.8rem 1.6rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      border: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 10px;
      font-weight: 500;
    }

    .status.success {
      background: rgba(16,185,129,0.12);
      color: var(--success);
    }

    .status.error {
      background: rgba(239,68,68,0.12);
      color: var(--danger);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.8rem;
    }

    @media (max-width: 992px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { 
        position: relative; 
        height: auto; 
        overflow: visible;
      }
      .main-content { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>MTech Admin</h2>
    </div>
    <nav class="sidebar-nav">
      <a href="#hero" class="active"><i class="fas fa-home"></i> Hero Section</a>
      <a href="#services"><i class="fas fa-server"></i> Services</a>
      <a href="#shop"><i class="fas fa-shopping-cart"></i> Hardware Teaser</a>
      <a href="#stats"><i class="fas fa-chart-bar"></i> Stats</a>
      <a href="#contact"><i class="fas fa-envelope"></i> Contact</a>
      <a href="#footer"><i class="fas fa-copyright"></i> Footer</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header>
      <h1>Content Management</h1>
      <div>
        <button class="btn btn-primary" onclick="loadAllData()"><i class="fas fa-sync"></i> Refresh All</button>
      </div>
    </header>

    <!-- Hero Section -->
    <div class="card" id="hero">
      <div class="card-header">
        <div class="card-title">Hero Section</div>
        <button class="btn btn-success" onclick="saveSection('hero')">Save Hero</button>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Badge Text</label>
          <input type="text" id="hero-badge" placeholder="Innovation in Mokopane">
        </div>
        <div class="form-group">
          <label>Main Title (before gradient)</label>
          <input type="text" id="hero-title-1" placeholder="Power Your Business With">
        </div>
      </div>
      <div class="form-group">
        <label>Gradient Text Part</label>
        <input type="text" id="hero-title-gradient" placeholder="Reliable IT">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="hero-desc"></textarea>
      </div>
      <div class="form-group">
        <label>Background Image URL</label>
        <input type="url" id="hero-bg" placeholder="https://images.unsplash.com/...">
      </div>
      <div id="hero-status" class="status"></div>
    </div>

    <!-- Services Section -->
    <div class="card" id="services">
      <div class="card-header">
        <div class="card-title">Services Grid</div>
        <button class="btn btn-success" onclick="saveSection('services')">Save Services</button>
      </div>
      <div id="services-container"></div>
      <div id="services-status" class="status"></div>
    </div>

    <!-- Shop Teaser -->
    <div class="card" id="shop">
      <div class="card-header">
        <div class="card-title">Hardware Teaser</div>
        <button class="btn btn-success" onclick="saveSection('shop')">Save Shop Teaser</button>
      </div>
      <div id="shop-container"></div>
      <div id="shop-status" class="status"></div>
    </div>

    <!-- Stats -->
    <div class="card" id="stats">
      <div class="card-header">
        <div class="card-title">Statistics</div>
        <button class="btn btn-success" onclick="saveSection('stats')">Save Stats</button>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Retention %</label>
          <input type="number" id="stat-retention" min="0" max="100">
        </div>
        <div class="form-group">
          <label>Clients Served</label>
          <input type="number" id="stat-clients">
        </div>
        <div class="form-group">
          <label>Support (hours)</label>
          <input type="number" id="stat-support">
        </div>
      </div>
      <div id="stats-status" class="status"></div>
    </div>

    <!-- Footer / Contact note -->
    <div class="card" id="footer">
      <div class="card-header">
        <div class="card-title">Footer & Contact Info</div>
        <button class="btn btn-success" onclick="saveSection('footer')">Save Footer</button>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Company Description</label>
          <textarea id="footer-desc"></textarea>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="footer-phone">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="footer-email">
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="footer-location">
        </div>
      </div>
      <div id="footer-status" class="status"></div>
    </div>

  </main>
</div>

<script>
// ────────────────────────────────────────────────
//  Firebase Setup
// ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
  authDomain: "pinotp-d7ef5.firebaseapp.com",
  databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
  projectId: "pinotp-d7ef5",
  storageBucket: "pinotp-d7ef5.firebasestorage.app",
  messagingSenderId: "708458917827",
  appId: "1:708458917827:web:375de278577df0adcf9776"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

// ────────────────────────────────────────────────
//  Cloudinary Upload Helper
// ────────────────────────────────────────────────
const CLOUD_NAME = "dv5bsbydu";
const UPLOAD_PRESET = "admin_tlaka";

async function uploadImage(file) {
  if (!file) return null;
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    if (data.secure_url) return data.secure_url;
    throw new Error(data.error?.message || "Upload failed");
  } catch (err) {
    alert("Image upload failed: " + err.message);
    return null;
  }
}

// ────────────────────────────────────────────────
//  Load / Save Helpers
// ────────────────────────────────────────────────
async function loadSection(path, callback) {
  try {
    const snap = await db.ref(path).once('value');
    if (snap.exists()) {
      callback(snap.val());
    }
  } catch (e) {
    console.error("Load failed:", e);
  }
}

function saveSection(path, data, statusEl) {
  statusEl.textContent = "Saving...";
  statusEl.className = "status";

  db.ref(path).set(data)
    .then(() => {
      statusEl.textContent = "✓ Saved successfully!";
      statusEl.className = "status success";
      setTimeout(() => { statusEl.textContent = ""; }, 3000);
    })
    .catch(err => {
      statusEl.textContent = "Error: " + err.message;
      statusEl.className = "status error";
    });
}

function loadAllData() {
  loadHero();
  loadServices();
  loadShop();
  loadStats();
  loadFooter();
}

// ────────────────────────────────────────────────
//  Hero
// ────────────────────────────────────────────────
function loadHero() {
  loadSection('content/hero', data => {
    document.getElementById('hero-badge').value         = data?.badge || "";
    document.getElementById('hero-title-1').value       = data?.titlePart1 || "";
    document.getElementById('hero-title-gradient').value= data?.titleGradient || "";
    document.getElementById('hero-desc').value          = data?.description || "";
    document.getElementById('hero-bg').value            = data?.background || "";
  });
}

function saveHero() {
  const data = {
    badge:         document.getElementById('hero-badge').value.trim(),
    titlePart1:    document.getElementById('hero-title-1').value.trim(),
    titleGradient: document.getElementById('hero-title-gradient').value.trim(),
    description:   document.getElementById('hero-desc').value.trim(),
    background:    document.getElementById('hero-bg').value.trim()
  };
  saveSection('content/hero', data, document.getElementById('hero-status'));
}

// ────────────────────────────────────────────────
//  Services (dynamic cards)
// ────────────────────────────────────────────────
let servicesArray = [];

function renderServices() {
  const container = document.getElementById('services-container');
  container.innerHTML = "";

  servicesArray.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.marginBottom = '1.4rem';
    div.innerHTML = `
      <div class="card-header">
        <div class="card-title">Service #${index+1}</div>
        <button class="btn btn-danger" onclick="removeService(${index})">Delete</button>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Icon Class (font-awesome)</label>
          <input type="text" value="${item.icon || ''}" data-index="${index}" data-field="icon">
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" value="${item.title || ''}" data-index="${index}" data-field="title">
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea data-index="${index}" data-field="description">${item.description || ''}</textarea>
      </div>
    `;
    container.appendChild(div);
  });

  // Add new
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary';
  addBtn.innerHTML = '<i class="fas fa-plus"></i> Add New Service';
  addBtn.onclick = () => {
    servicesArray.push({ icon:"", title:"", description:"" });
    renderServices();
  };
  container.appendChild(addBtn);
}

function removeService(idx) {
  if (confirm("Delete this service?")) {
    servicesArray.splice(idx, 1);
    renderServices();
  }
}

function loadServices() {
  loadSection('content/services', data => {
    servicesArray = Array.isArray(data) ? data : [];
    renderServices();
  });
}

function saveServices() {
  const items = [];
  document.querySelectorAll('#services-container input, #services-container textarea').forEach(el => {
    const idx = el.dataset.index;
    const field = el.dataset.field;
    if (idx !== undefined && field) {
      if (!items[idx]) items[idx] = {};
      items[idx][field] = el.value.trim();
    }
  });
  saveSection('content/services', items, document.getElementById('services-status'));
}

// ────────────────────────────────────────────────
//  Shop Teaser (similar to services)
// ────────────────────────────────────────────────
let shopArray = [];

function renderShop() {
  const container = document.getElementById('shop-container');
  container.innerHTML = "";

  shopArray.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.marginBottom = '1.4rem';
    div.innerHTML = `
      <div class="card-header">
        <div class="card-title">Product #${index+1}</div>
        <button class="btn btn-danger" onclick="removeShopItem(${index})">Delete</button>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Image URL</label>
          <input type="url" value="${item.image || ''}" data-index="${index}" data-field="image">
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" value="${item.title || ''}" data-index="${index}" data-field="title">
        </div>
      </div>
      <div class="form-group">
        <label>Subtitle / Description</label>
        <input type="text" value="${item.subtitle || ''}" data-index="${index}" data-field="subtitle">
      </div>
    `;
    container.appendChild(div);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary';
  addBtn.innerHTML = '<i class="fas fa-plus"></i> Add New Product';
  addBtn.onclick = () => {
    shopArray.push({ image:"", title:"", subtitle:"" });
    renderShop();
  };
  container.appendChild(addBtn);
}

function removeShopItem(idx) {
  if (confirm("Delete this product?")) {
    shopArray.splice(idx, 1);
    renderShop();
  }
}

function loadShop() {
  loadSection('content/shop', data => {
    shopArray = Array.isArray(data) ? data : [];
    renderShop();
  });
}

function saveShop() {
  const items = [];
  document.querySelectorAll('#shop-container input').forEach(el => {
    const idx = el.dataset.index;
    const field = el.dataset.field;
    if (idx !== undefined && field) {
      if (!items[idx]) items[idx] = {};
      items[idx][field] = el.value.trim();
    }
  });
  saveSection('content/shop', items, document.getElementById('shop-status'));
}

// ────────────────────────────────────────────────
//  Stats
// ────────────────────────────────────────────────
function loadStats() {
  loadSection('content/stats', data => {
    document.getElementById('stat-retention').value = data?.retention || 98;
    document.getElementById('stat-clients').value   = data?.clients   || 350;
    document.getElementById('stat-support').value   = data?.support   || 24;
  });
}

function saveStats() {
  const data = {
    retention: Number(document.getElementById('stat-retention').value) || 0,
    clients:   Number(document.getElementById('stat-clients').value)   || 0,
    support:   Number(document.getElementById('stat-support').value)   || 0
  };
  saveSection('content/stats', data, document.getElementById('stats-status'));
}

// ────────────────────────────────────────────────
//  Footer / Contact
// ────────────────────────────────────────────────
function loadFooter() {
  loadSection('content/footer', data => {
    document.getElementById('footer-desc').value     = data?.description || "";
    document.getElementById('footer-phone').value    = data?.phone      || "";
    document.getElementById('footer-email').value    = data?.email      || "";
    document.getElementById('footer-location').value = data?.location   || "";
  });
}

function saveFooter() {
  const data = {
    description: document.getElementById('footer-desc').value.trim(),
    phone:       document.getElementById('footer-phone').value.trim(),
    email:       document.getElementById('footer-email').value.trim(),
    location:    document.getElementById('footer-location').value.trim()
  };
  saveSection('content/footer', data, document.getElementById('footer-status'));
}

// ────────────────────────────────────────────────
//  Unified Save (called from each section button)
// ────────────────────────────────────────────────
function saveSection(section) {
  if (section === 'hero')   return saveHero();
  if (section === 'services') return saveServices();
  if (section === 'shop')    return saveShop();
  if (section === 'stats')   return saveStats();
  if (section === 'footer')  return saveFooter();
}

// ────────────────────────────────────────────────
//  Init
// ────────────────────────────────────────────────
window.addEventListener('load', () => {
  loadAllData();

  // Sidebar active link
  document.querySelectorAll('.sidebar-nav a').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
      link.classList.add('active');
      const target = document.querySelector(link.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
  });
});
</script>
</body>
</html>
