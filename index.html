<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTech Solutions | Admin Dashboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --primary: #0066ff;
      --primary-hover: #0052cc;
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
      --shadow-md: 0 10px 30px rgba(0,0,0,0.05);
      --shadow-lg: 0 20px 40px rgba(0,102,255,0.1);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      padding-bottom: 100px; /* Space for sticky footer */
    }

    /* Navbar */
    .navbar {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h1 {
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .navbar h1 i { color: var(--primary); }

    .user-badge {
      background: #e0e7ff;
      color: var(--primary);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* Main Container */
    .container {
      max-width: 1000px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: var(--shadow-md);
      margin-bottom: 2.5rem;
      border: 1px solid rgba(255,255,255,0.5);
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .card-header i {
      font-size: 1.5rem;
      color: var(--primary);
      background: #eff6ff;
      padding: 0.75rem;
      border-radius: 12px;
    }

    .card-header h2 {
      font-size: 1.25rem;
      font-weight: 700;
    }

    /* Forms */
    .form-group { margin-bottom: 1.5rem; }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    
    input[type="text"], input[type="number"], textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      transition: var(--transition);
      background: #f8fafc;
      color: var(--text-main);
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
    }

    textarea { resize: vertical; min-height: 100px; }

    /* Grid Layouts */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 1.5rem;
    }

    .item-box {
      border: 1px solid var(--border);
      padding: 1.5rem;
      border-radius: 12px;
      background: #fafaf9;
      transition: var(--transition);
    }

    .item-box:hover {
      border-color: #cbd5e1;
      box-shadow: var(--shadow-sm);
      transform: translateY(-2px);
    }

    .item-box h4 {
      margin: 0 0 1.25rem 0;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
    }

    /* Custom File Upload */
    .file-upload-wrapper {
      position: relative;
      margin-bottom: 1rem;
    }
    
    .file-upload-input {
      width: 0.1px; height: 0.1px; opacity: 0; overflow: hidden; position: absolute; z-index: -1;
    }
    
    .file-upload-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      background: white;
      border: 2px dashed var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      color: var(--text-muted);
      transition: var(--transition);
    }
    
    .file-upload-label:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #eff6ff;
    }

    .image-preview {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 1rem;
      display: none;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .upload-status {
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-success { color: #10b981; }
    .status-loading { color: var(--primary); }
    .status-error { color: #ef4444; }

    /* Sticky Footer Action */
    .action-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      z-index: 1000;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 1rem 3rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: var(--shadow-lg);
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(0,102,255,0.2);
    }

    .btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Toast Notification */
    #toast {
      visibility: hidden;
      min-width: 300px;
      background: #10b981;
      color: #fff;
      text-align: center;
      border-radius: 12px;
      padding: 1rem;
      position: fixed;
      z-index: 2000;
      left: 50%;
      top: 20px;
      transform: translateX(-50%) translateY(-20px);
      opacity: 0;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    #toast.show {
      visibility: visible;
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Spinner Animation */
    .fa-spinner { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

  </style>
</head>
<body>

<nav class="navbar">
  <h1><i class="fas fa-layer-group"></i> MTech Admin</h1>
  <div class="user-badge"><i class="fas fa-user-shield"></i> System Admin</div>
</nav>

<div class="container">
  
  <div class="card">
    <div class="card-header">
      <i class="fas fa-heading"></i>
      <h2>Hero Section</h2>
    </div>
    <div class="form-group">
      <label>Badge Text</label>
      <input type="text" id="heroBadge" placeholder="e.g. Innovation in Mokopane">
    </div>
    <div class="form-group">
      <label>Main Title (Use &lt;span class="text-gradient"&gt; for blue text)</label>
      <input type="text" id="heroTitle" placeholder="Power Your Business With...">
    </div>
    <div class="form-group">
      <label>Subtitle / Description</label>
      <textarea id="heroDesc" placeholder="Enter the sub-heading text here..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <i class="fas fa-laptop"></i>
      <h2>Hardware Shop Products</h2>
    </div>
    <div class="grid-2" id="shopContainer">
      </div>
  </div>

  <div class="card">
    <div class="card-header">
      <i class="fas fa-chart-line"></i>
      <h2>Statistics Results</h2>
    </div>
    <div class="grid-2" id="statsContainer">
      </div>
  </div>

</div>

<div class="action-bar">
  <button class="btn" id="saveBtn" onclick="saveData()">
    <i class="fas fa-cloud-upload-alt"></i> Publish Changes
  </button>
</div>

<div id="toast"><i class="fas fa-check-circle"></i> Website updated successfully!</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // --- 1. CONFIGURATION ---
  const firebaseConfig = {
      apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
      authDomain: "pinotp-d7ef5.firebaseapp.com",
      databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
      projectId: "pinotp-d7ef5",
      storageBucket: "pinotp-d7ef5.firebasestorage.app",
      messagingSenderId: "708458917827",
      appId: "1:708458917827:web:375de278577df0adcf9776"
  };
  
  const CLOUD_NAME = "dv5bsbydu";
  const UPLOAD_PRESET = "admin_tlaka";

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // --- 2. BUILD UI DYNAMICALLY ---
  const shopContainer = document.getElementById('shopContainer');
  for (let i = 0; i < 4; i++) {
    shopContainer.innerHTML += `
      <div class="item-box">
        <h4><i class="fas fa-box"></i> Product ${i + 1}</h4>
        
        <div class="file-upload-wrapper">
          <input type="file" id="file${i}" class="file-upload-input" accept="image/*" onchange="uploadImage(event, ${i})">
          <label for="file${i}" class="file-upload-label">
            <i class="fas fa-cloud-upload-alt"></i> Choose Image
          </label>
        </div>
        
        <div id="uploadStatus${i}" class="upload-status"></div>
        <img id="shopImgPreview${i}" class="image-preview">
        <input type="hidden" id="shopImgUrl${i}">
        
        <div class="form-group" style="margin-top: 1rem;">
          <label>Title</label>
          <input type="text" id="shopTitle${i}" placeholder="Product Name">
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="shopDesc${i}" placeholder="Short description">
        </div>
      </div>
    `;
  }

  const statsContainer = document.getElementById('statsContainer');
  for (let i = 0; i < 3; i++) {
    statsContainer.innerHTML += `
      <div class="item-box">
        <h4><i class="fas fa-star"></i> Statistic ${i + 1}</h4>
        <div class="form-group">
          <label>Number Value</label>
          <input type="number" id="statNum${i}" placeholder="e.g. 98">
        </div>
        <div class="form-group">
          <label>Label</label>
          <input type="text" id="statLabel${i}" placeholder="e.g. Retention %">
        </div>
      </div>
    `;
  }

  // --- 3. FETCH EXISTING DATA ---
  db.ref('websiteContent').once('value').then((snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    if(data.hero) {
      document.getElementById('heroBadge').value = data.hero.badge || '';
      document.getElementById('heroTitle').value = data.hero.title || '';
      document.getElementById('heroDesc').value = data.hero.desc || '';
    }

    if(data.shop) {
      data.shop.forEach((item, i) => {
        document.getElementById(`shopTitle${i}`).value = item.title || '';
        document.getElementById(`shopDesc${i}`).value = item.desc || '';
        document.getElementById(`shopImgUrl${i}`).value = item.image || '';
        if(item.image) {
          const imgPreview = document.getElementById(`shopImgPreview${i}`);
          imgPreview.src = item.image;
          imgPreview.style.display = 'block';
        }
      });
    }

    if(data.stats) {
      data.stats.forEach((item, i) => {
        document.getElementById(`statNum${i}`).value = item.num || '';
        document.getElementById(`statLabel${i}`).value = item.label || '';
      });
    }
  });

  // --- 4. UPLOAD LOGIC ---
  async function uploadImage(event, index) {
    const file = event.target.files[0];
    if (!file) return;

    const statusEl = document.getElementById(`uploadStatus${index}`);
    statusEl.innerHTML = `<i class="fas fa-spinner status-loading"></i> <span class="status-loading">Uploading...</span>`;
    document.getElementById('saveBtn').disabled = true;

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);

    try {
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      
      document.getElementById(`shopImgUrl${index}`).value = data.secure_url;
      const imgPreview = document.getElementById(`shopImgPreview${index}`);
      imgPreview.src = data.secure_url;
      imgPreview.style.display = 'block';
      statusEl.innerHTML = `<i class="fas fa-check status-success"></i> <span class="status-success">Uploaded successfully</span>`;
      
    } catch (error) {
      statusEl.innerHTML = `<i class="fas fa-times status-error"></i> <span class="status-error">Upload failed</span>`;
      console.error(error);
    } finally {
      document.getElementById('saveBtn').disabled = false;
    }
  }

  // --- 5. SAVE TO FIREBASE ---
  function saveData() {
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.innerHTML = `<i class="fas fa-spinner"></i> Publishing...`;
    saveBtn.disabled = true;

    const shopData = [];
    for(let i=0; i<4; i++) {
      shopData.push({
        title: document.getElementById(`shopTitle${i}`).value,
        desc: document.getElementById(`shopDesc${i}`).value,
        image: document.getElementById(`shopImgUrl${i}`).value
      });
    }

    const statsData = [];
    for(let i=0; i<3; i++) {
      statsData.push({
        num: document.getElementById(`statNum${i}`).value,
        label: document.getElementById(`statLabel${i}`).value
      });
    }

    const payload = {
      hero: {
        badge: document.getElementById('heroBadge').value,
        title: document.getElementById('heroTitle').value,
        desc: document.getElementById('heroDesc').value
      },
      shop: shopData,
      stats: statsData
    };

    db.ref('websiteContent').set(payload).then(() => {
      saveBtn.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Publish Changes`;
      saveBtn.disabled = false;
      showToast();
    }).catch((error) => {
      alert("Error saving data: " + error.message);
      saveBtn.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Publish Changes`;
      saveBtn.disabled = false;
    });
  }

  function showToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 3500);
  }
</script>
</body>
</html>
